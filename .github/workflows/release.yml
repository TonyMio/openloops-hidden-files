name: Release

# Fires when a bare semver tag (Obsidian requires tag == manifest version, no `v`
# prefix) is pushed. Builds main.js in CI, attests its build provenance, and
# publishes the GitHub release with the installable assets.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write # create the release + upload assets
  id-token: write # OIDC token the attestation is signed with
  attestations: write # write the provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest version
        run: |
          manifest_version=$(node -p "require('./manifest.json').version")
          if [ "$manifest_version" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match manifest.json version ${manifest_version}"
            exit 1
          fi

      - name: Build release artifacts
        run: npm run release

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/openloops-hidden-files/main.js

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/openloops-hidden-files/main.js \
            dist/openloops-hidden-files/manifest.json \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
